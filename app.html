            {
                id: 2,

                id: 4,

            },
            {
                id: 5,
                name: 'Hernia Repair',

            {

                costPerPaycheck: 12,

                description: 'Sleep study, diagnosis, and CPAP equipment'
            },
            {
                id: 7,
                name: 'Bariatric Surgery',
                costPerPaycheck: 55,

            },
            {
                id: 8,

        const recentActivity = [
            {

                id: 2,

                id: 3,

        // Main App Component
        function App() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedService, setSelectedService] = useState(null);
            const [selectedProvider, setSelectedProvider] = useState(null);
            const [showConfirmation, setShowConfirmation] = useState(false);

            // Map category names to provider data keys
            const serviceKeyMap = {
                'Imaging': 'Knee MRI',
                'Primary Care': 'Primary Care',
                'Specialist': 'Dermatologist',
                'Therapy': 'Physical Therapy',
                'Lab & Testing': 'Lab Work',
                'Urgent/ER': 'Urgent Care',
                'Knee MRI': 'Knee MRI',
                'Dermatologist': 'Dermatologist',
                'Physical Therapy': 'Physical Therapy',
                'Orthopedic Surgery': 'Orthopedic Surgery',

            const handleServiceSelect = (service) => {
                setSelectedService(service);
                setSortBy('price');

            };

            const handleProviderSelect = (provider) => {
                setSelectedProvider(provider);
                setShowConfirmation(true);
            };

            const handleConfirmBooking = () => {
                if (selectedProvider) {
                    setUpcomingVisits([...upcomingVisits, {
                        service: selectedService,
                        provider: selectedProvider.name,
                        copay: selectedProvider.copay,
                        date: 'Mar 15, 2025'
                    }]);
                    setShowSuccess(true);
                }
            };

            const handleActivateAddIn = (addIn) => {
                setSelectedAddIn(addIn);
                setShowAddInModal(true);
            };

            const handleConfirmAddIn = () => {
                if (selectedAddIn && !activeAddIns.includes(selectedAddIn.id)) {
                    setActiveAddIns([...activeAddIns, selectedAddIn.id]);
                    setShowAddInModal(false);
                    setSelectedAddIn(null);
                }
            };

            const getSortedProviders = () => {
                if (!selectedService) return [];
                const providerKey = serviceKeyMap[selectedService] || selectedService;
                let providers = [...(mockProviders[providerKey] || [])];

                if (sortBy === 'price') {
                    providers.sort((a, b) => a.copay - b.copay);
                } else if (sortBy === 'rating') {
                    providers.sort((a, b) => b.rating - a.rating);
                } else if (sortBy === 'distance') {
                    providers.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
                }
                return providers;
            };

            return (
                <div className="app-container">
                    <div className="content-area">
                        {currentTab === 'dashboard' && (
                            <DashboardView upcomingVisits={upcomingVisits} />

                        {currentTab === 'care' && (
                            selectedService ? (
                                <CareSearchResults
                                    service={selectedService}
                                    providers={getSortedProviders()}
                                    onSelectProvider={handleProviderSelect}
                                    onBack={() => {
                                        setSelectedService(null);
                                        setSelectedProvider(null);
                                    }}
                                    sortBy={sortBy}
                                    onSortChange={setSortBy}
                                />
                            ) : (
                                <CareSearchView
                                    onSelectService={handleServiceSelect}
                                    searchQuery={searchQuery}

                    {showConfirmation && selectedProvider && (
                        <ConfirmationModal
                            service={selectedService}
                            provider={selectedProvider}

                    {showSuccess && (

                    {showAddInModal && selectedAddIn && (

                                setSelectedAddIn(null);
                            }}

                    )}

                    <div className="bottom-nav">
                        <div
                            className={`nav-item ${currentTab === 'dashboard' ? 'active' : ''}`}

                            <div>Dashboard</div>
                        </div>
                        <div
                            className={`nav-item ${currentTab === 'care' ? 'active' : ''}`}
                            onClick={() => setCurrentTab('care')}

                            <div className="nav-icon">🔍</div>
                            <div>Find Care</div>
                        </div>
                        <div
                            className={`nav-item ${currentTab === 'addins' ? 'active' : ''}`}

                            <div className="nav-icon">⭐</div>
                            <div>Add-ins</div>
                        </div>
                    </div>
                </div>
            );
        }

        // Dashboard View
        function DashboardView({ upcomingVisits }) {
            const oopSpent = 847;
            const oopMax = 6000;
            const progress = (oopSpent / oopMax) * 100;

            return (
                <>
                    <div className="header">
                        <div className="welcome-text">Welcome back, Sarah</div>
                        <div className="plan-name">
                            💜 Pillar Health — Bind-Style Plan
                        </div>
                        <div className="badge-ai">AI-Powered</div>
                    </div>

                    <div style={{ padding: '20px' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '20px' }}>
                            <div className="stat-card">
                                <div className="stat-label">OOP Spent</div>
                                <div className="stat-value">${oopSpent}</div>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                                </div>
                                <div className="progress-text">of ${oopMax} max</div>
                            </div>

                            <div className="stat-card">
                                <div className="stat-label">Claims YTD</div>
                                <div className="stat-value">12</div>
                                <div style={{ fontSize: '12px', color: '#64748b' }}>medical claims</div>
                            </div>

                            <div className="stat-card">
                                <div className="stat-label">Active Add-ins</div>
                                <div className="stat-value">2</div>
                                <div style={{ fontSize: '12px', color: '#16a34a' }}>coverage activated</div>
                            </div>

                            <div className="stat-card">
                                <div className="stat-label">Savings YTD</div>
                                <div className="stat-value" style={{ color: '#16a34a' }}>$1,230</div>
                                <div style={{ fontSize: '12px', color: '#64748b' }}>vs. traditional</div>
                            </div>
                        </div>

                        <div style={{ marginBottom: '20px' }}>
                            <div className="section-title">Quick Actions</div>
                            <div className="quick-actions">

                                <button className="quick-action-btn">🆔 ID Card</button>
                                <button className="quick-action-btn">❓ Get Help</button>
                            </div>
                        </div>

                        <div>
                            <div className="section-title">Recent Activity</div>
                            {recentActivity.map(activity => (
                                <div key={activity.id} className="activity-item">
                                    <div className="activity-title">{activity.title}</div>
                                    <div className="activity-meta">

                                        <span>{activity.date}</span>

                        </div>
                    </div>
                </>
            );

        // Care Search View
        function CareSearchView({ onSelectService, searchQuery, onSearchChange }) {

                { name: 'Primary Care', icon: '👨‍⚕️', key: 'primary' },
                { name: 'Specialist', icon: '👩‍⚕️', key: 'specialist' },
                { name: 'Therapy', icon: '💪', key: 'therapy' },
                { name: 'Lab & Testing', icon: '🧪', key: 'lab' },

            return (
                <div style={{ padding: '20px' }}>
                    <div className="header" style={{ margin: '-20px -20px 0 -20px', padding: '24px', marginBottom: '20px' }}>
                        <div className="welcome-text">Find Care</div>
                        <div className="plan-name">What do you need today?</div>
                    </div>

                    <input

                                    <div style={{ marginTop: '8px' }}>
                                        <div className="active-badge">Active since {product.activatedDate}</div>

                                <button

                                    Activate

                            ) : (
                                <div className="active-badge">Active</div>
                            )}

                    ))}

                    <div className="footer">
                        Powered by Pillar Health
                        <div className="nppes-footnote">Provider data from CMS National Provider Registry. Copays based on Medicare reference pricing.</div>
                    </div>
                </div>
            );

        // Add-In Activation Modal
        function AddInActivationModal({ addIn, onConfirm, onClose }) {
            const totalCost = addIn.costPerPaycheck * addIn.duration;
            const biweeklyPaychecks = 26; // 26 paychecks per year, roughly 2 per month
            const startDate = new Date();
            startDate.setDate(startDate.getDate() + 7);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="modal-title">Activate {addIn.name}</div>

                        <div style={{ background: '#f0f9ff', padding: '16px', borderRadius: '10px', marginBottom: '20px' }}>

                                {addIn.description}

                        </div>

                        <div style={{ borderTop: '1px solid #e2e8f0', borderBottom: '1px solid #e2e8f0', paddingY: '16px', marginBottom: '20px' }}>

                            <div className="detail-row">
                                <span className="detail-label">Coverage period</span>

                            <div className="detail-row">

                                <span className="detail-value">{startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>

                        </div>

                        <div style={{ background: '#f0fdf4', padding: '12px', borderRadius: '8px', marginBottom: '20px', fontSize: '13px', color: '#166534' }}>
                            ✓ You can cancel anytime. Your deduction adjusts immediately.
                        </div>

                        <button className="confirm-btn" onClick={onConfirm}>
                            Activate Coverage
                        </button>
                    </div>
                </div>
            );
        }

        // Render app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
